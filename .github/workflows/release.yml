name: NPM Publish on Tag

on:
  push:
    tags:
      - "*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js for NPM
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run format and lint checks
        run: bun run check

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # Trusted publishing (OIDC) requires npm >= 11.5.1
      - name: Upgrade npm for OIDC
        run: npm install -g npm@latest

      - name: Publish to NPM
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            PRE="${VERSION#*-}"        # 1.0.0-beta.2 -> beta.2 ; 1.0.0-1 -> 1
            TAG="${PRE%%.*}"           # beta.2 -> beta ; 1 -> 1
            [[ "$TAG" =~ ^[0-9]+$ ]] && TAG=next   # numeric prerelease -> next
          else
            TAG=latest
          fi
          echo "Publishing $VERSION with dist-tag: $TAG"
          npm publish --access public --tag "$TAG"
